<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイックQR | Pinda Lab</title>
<meta name="description" content="テキストやURLをすぐにQRコードに!画像保存もできるシンプルなQR生成ツール。">
<meta property="og:title" content="クイックQR">
<meta property="og:description" content="テキスト/URL→QRコード即生成。PNG保存対応。">
<meta property="og:url" content="https://pndshch.github.io/quick-qr/">
<meta name="twitter:card" content="summary">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Hiragino Sans', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 32px;
}
.topbar {
    width: 100%; max-width: 480px;
    display: flex; justify-content: space-between;
    color: #6d7680; font-size: 12px; margin-bottom: 12px;
}
.topbar a { color: #6d7680; text-decoration: none; }
.brand-title {
    font-size: 30px; font-weight: 800; text-align: center;
    background: linear-gradient(135deg, #06b6d4, #14b8a6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
}
.brand-sub { color: #8b949e; font-size: 13px; text-align: center; margin-top: 4px; margin-bottom: 16px; }

.card {
    width: 100%;
    max-width: 480px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 18px;
}
.label {
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 700;
}
textarea {
    width: 100%;
    min-height: 90px;
    background: #0d1117;
    border: 2px solid #30363d;
    color: #e6edf3;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    outline: none;
}
textarea:focus { border-color: #06b6d4; }

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
}
.opt {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 12px;
}
.opt-label {
    font-size: 10px;
    color: #6d7680;
    letter-spacing: 1px;
    text-transform: uppercase;
}
.opt select, .opt input[type="color"] {
    width: 100%;
    background: transparent;
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 14px;
    padding: 4px 0;
    outline: none;
    cursor: pointer;
}
.opt input[type="color"] { padding: 0; height: 28px; }

.qr-wrap {
    margin-top: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    max-width: 100%;
}
canvas#qr {
    width: 100% !important;
    height: auto !important;
    max-width: 360px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

.actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    width: 100%;
    max-width: 480px;
}
.btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    color: #fff;
}
.btn:active { transform: scale(0.97); }
.btn-download { background: #2ea043; }
.btn-copy { background: #4b5563; }
.btn-copy.copied { background: #2ea043; }

.examples {
    margin-top: 14px;
    width: 100%;
    max-width: 480px;
    text-align: center;
}
.ex-label { color: #6d7680; font-size: 11px; margin-bottom: 6px; }
.ex-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}
.ex {
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 6px 10px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
}
.ex:hover { color: #fff; border-color: #06b6d4; }

.footer {
    margin-top: 18px;
    color: #6d7680;
    font-size: 11px;
    text-align: center;
}
.footer a { color: #6d7680; text-decoration: none; }
</style>
</head>
<body>
<div class="topbar">
    <a href="https://pndshch.github.io/">← Pinda Lab</a>
    <span>クイックQR</span>
</div>

<div class="brand-title">クイックQR</div>
<div class="brand-sub">テキストや URL を すぐ QR コードに</div>

<div class="card">
    <div class="label">📝 ないよう (テキスト or URL)</div>
    <textarea id="input" placeholder="ここに入力 (例: https://pndshch.github.io/)" rows="3">https://pndshch.github.io/</textarea>

    <div class="options">
        <div class="opt">
            <div class="opt-label">サイズ</div>
            <select id="size">
                <option value="200">200px</option>
                <option value="300" selected>300px</option>
                <option value="500">500px</option>
                <option value="800">800px (大)</option>
            </select>
        </div>
        <div class="opt">
            <div class="opt-label">エラー訂正</div>
            <select id="ecl">
                <option value="L">L (低)</option>
                <option value="M" selected>M (中)</option>
                <option value="Q">Q (高)</option>
                <option value="H">H (最高)</option>
            </select>
        </div>
        <div class="opt">
            <div class="opt-label">前景色</div>
            <input type="color" id="fg" value="#0d1117">
        </div>
        <div class="opt">
            <div class="opt-label">背景色</div>
            <input type="color" id="bg" value="#ffffff">
        </div>
    </div>

    <div class="qr-wrap" id="qr-wrap">
        <canvas id="qr"></canvas>
    </div>
</div>

<div class="actions">
    <button class="btn btn-download" id="download">⬇ PNGで保存</button>
    <button class="btn btn-copy" id="copy">📋 画像コピー</button>
</div>

<div class="examples">
    <div class="ex-label">れい:</div>
    <div class="ex-list">
        <span class="ex" data-t="https://pndshch.github.io/">Pinda Lab</span>
        <span class="ex" data-t="WIFI:T:WPA;S:MyNetwork;P:password;;">WiFi接続</span>
        <span class="ex" data-t="mailto:hndshch@gmail.com">メール</span>
        <span class="ex" data-t="tel:09012345678">電話</span>
    </div>
</div>

<div class="footer">
    <p><a href="https://pndshch.github.io/">© Pinda Lab</a> · <a href="https://www.buymeacoffee.com/pndshch" target="_blank">☕</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
'use strict';
const inp = document.getElementById('input');
const canvas = document.getElementById('qr');
const sizeSel = document.getElementById('size');
const eclSel = document.getElementById('ecl');
const fgInp = document.getElementById('fg');
const bgInp = document.getElementById('bg');

let renderTimer = null;
function render() {
    const text = inp.value || ' ';
    const size = parseInt(sizeSel.value, 10);
    const ecl = eclSel.value;
    const fg = fgInp.value;
    const bg = bgInp.value;

    QRCode.toCanvas(canvas, text, {
        width: size,
        margin: 2,
        errorCorrectionLevel: ecl,
        color: { dark: fg, light: bg },
    }, (err) => {
        if (err) console.error(err);
    });
}
function debounceRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(render, 80);
}

inp.addEventListener('input', debounceRender);
[sizeSel, eclSel, fgInp, bgInp].forEach(el => el.addEventListener('input', render));

document.querySelectorAll('.ex').forEach(b => b.addEventListener('click', () => {
    inp.value = b.dataset.t;
    render();
}));

document.getElementById('download').addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = 'qr-' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
});

document.getElementById('copy').addEventListener('click', async (e) => {
    if (!navigator.clipboard || !window.ClipboardItem) {
        e.target.textContent = '✗ 非対応';
        setTimeout(() => e.target.textContent = '📋 画像コピー', 1500);
        return;
    }
    try {
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        e.target.classList.add('copied');
        e.target.textContent = '✓ コピーしました';
        setTimeout(() => {
            e.target.classList.remove('copied');
            e.target.textContent = '📋 画像コピー';
        }, 1500);
    } catch (err) {
        console.error(err);
        e.target.textContent = '✗ 失敗';
        setTimeout(() => e.target.textContent = '📋 画像コピー', 1500);
    }
});

window.addEventListener('load', render);
</script>
</body>
</html>
